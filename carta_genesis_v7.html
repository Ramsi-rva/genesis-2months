<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Mesesario 🌸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    #scene {
      width: 100vw; height: 100dvh;
      position: relative; overflow: hidden;
      background: #fff0f5;
      display: flex; align-items: center; justify-content: center;
      transition: background 3s ease;
    }
    #scene.dark { background: #120008; }

    #sobre-wrap {
      position: relative;
      width: min(260px, 72vw);
      cursor: pointer; z-index: 20;
      transition: opacity 0.8s ease, transform 0.3s;
      filter: drop-shadow(0 8px 24px rgba(200,60,100,0.22));
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #sobre-wrap:hover  { transform: scale(1.04); }
    #sobre-wrap:active { transform: scale(0.97); }
    #sobre-wrap.hide   { opacity: 0; pointer-events: none; }
    #sobre-svg { width: 100%; height: auto; display: block; }

    #hint {
      text-align: center; margin-top: 8px;
      font-size: 13px; color: #c0607a;
      font-family: Georgia, serif; font-style: italic;
      transition: opacity .4s;
    }

    .palabra {
      position: absolute;
      font-family: Georgia, serif; font-style: italic;
      pointer-events: none; z-index: 30;
      opacity: 0; white-space: nowrap;
      animation: volar var(--dur) ease-out forwards;
    }
    @keyframes volar {
      0%   { opacity: 0; transform: translate(0,0) scale(.3) rotate(var(--r0)); }
      18%  { opacity: 1; }
      82%  { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.1) rotate(var(--r1)); }
    }

    #arbol-wrap {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0; transition: opacity 2.2s ease;
      z-index: 5; pointer-events: none;
    }
    #arbol-wrap.show { opacity: 1; }

    /* El SVG ocupa toda el área pero respeta aspect-ratio */
    #arbol-svg {
      position: absolute;
      /* Centramos el árbol horizontalmente y lo anclamos abajo */
      width: 100%; height: 100%;
      top: 0; left: 0;
    }

    .hoja {
      position: absolute;
      font-family: Georgia, serif; font-style: italic;
      pointer-events: none; z-index: 8;
      opacity: 0; white-space: nowrap;
      transition: opacity 1.4s ease;
      transform-origin: left center;
    }
    .hoja.show { opacity: 1; }

    #frase {
      position: absolute;
      top: clamp(20px, 5vh, 55px);
      left: 50%;
      transform: translateX(-50%) scale(.7);
      opacity: 0; z-index: 40;
      text-align: center; width: 90%;
      transition: transform 1.5s cubic-bezier(.34,1.56,.64,1), opacity 1.5s ease;
    }
    #frase.show { transform: translateX(-50%) scale(1); opacity: 1; }
    #frase h1 {
      font-family: Georgia, serif;
      font-size: clamp(22px, 5.5vw, 36px);
      color: #ffb3c6; font-style: italic; line-height: 1.4;
      text-shadow: 0 0 40px rgba(255,100,150,.8), 0 0 80px rgba(255,80,130,.4);
    }
    #frase p {
      font-size: clamp(11px, 2.5vw, 14px);
      color: #f090a8; font-style: italic; margin-top: .4rem;
    }
  </style>
</head>
<body>

      <path d="M228 308 C224 292 222 278 220 262" stroke="#6b2535" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M260 440 C272 415 278 392 282 368" stroke="#4a1a25" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M282 368 C290 348 296 330 302 310" stroke="#5a2030" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M282 368 C286 348 288 328 292 308" stroke="#5a2030" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Flores decorativas en ramas -->
      <ellipse cx="95" cy="410" rx="5" ry="3" fill="#ffb3c6" opacity=".7" transform="rotate(-20,95,410)"/>
      <ellipse cx="130" cy="375" rx="4" ry="2.5" fill="#ff8fab" opacity=".8" transform="rotate(15,130,375)"/>
      <ellipse cx="200" cy="340" rx="5" ry="3" fill="#ffc2d4" opacity=".6" transform="rotate(-10,200,340)"/>
      <ellipse cx="320" cy="345" rx="4" ry="2.5" fill="#ff8fab" opacity=".7" transform="rotate(20,320,345)"/>
      <ellipse cx="390" cy="375" rx="5" ry="3" fill="#ffb3c6" opacity=".8" transform="rotate(-15,390,375)"/>
      <ellipse cx="425" cy="412" rx="4" ry="2.5" fill="#ffc2d4" opacity=".6" transform="rotate(10,425,412)"/>
      <ellipse cx="230" cy="300" rx="4" ry="2.5" fill="#ff8fab" opacity=".7" transform="rotate(-10,230,300)"/>
      <ellipse cx="290" cy="300" rx="4" ry="2.5" fill="#ffb3c6" opacity=".7" transform="rotate(10,290,300)"/>
    </svg>
  </div>

  <!-- Sobre -->
  <div id="sobre-wrap">
    <svg id="sobre-svg" viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="260" height="180" rx="6" fill="#ffd6e7" stroke="#f4a0bb" stroke-width="1.5"/>
      <polygon points="0,180 260,180 130,100" fill="#f9bdd0"/>
      <polygon points="0,0 0,180 130,100" fill="#f4b8cc" opacity=".5"/>
      <polygon points="260,0 260,180 130,100" fill="#f4b8cc" opacity=".5"/>
      <polygon points="0,0 260,0 130,88" fill="#f9c8d8" stroke="#f4a0bb" stroke-width="1"/>
      <path d="M130 105 C130 105 112 92 104 97 C94 103 94 116 104 122 C111 127 122 133 130 140 C138 133 149 127 156 122 C166 116 166 103 156 97 C148 92 130 105 130 105Z" fill="#e05070" opacity=".9"/>
    </svg>
    <div id="hint">Toca para abrir ♡</div>
  </div>

  <!-- Frase final -->
  <div id="frase">
    <h1>🌸 Feliz Mesesario<br>Mi Niña 🌸</h1>
    <p>Cada mes a tu lado es mi lugar favorito del mundo</p>
  </div>

</div>
<script>
  const palabras = [
    "te amo","mi niña","eres mi todo","preciosa","mi paz","te extraño","siempre",
    "mi corazón","hermosa","feliz","te quiero","mi vida","amor mío","mi cielo",
    "especial","única","sonríe","te adoro","mi calma","mi mundo","para siempre",
    "eres mi luz","mi dulzura","contigo","bonita","mi alegría","te necesito",
    "eres perfecta","mi estrella","te cuido","mi sueño","eres mía","te abrazo",
    "mi risa","te elijo","cada día","mi refugio","mi tesoro","eres todo","te llevo"
  ];

  const colores = [
    "#ff6b8a","#ffb3c6","#ff4d6d","#ff8fab","#e05070",
    "#ffc2d4","#ff758f","#f72585","#ffa0b8","#ff3366"
  ];

  // Puntos en coordenadas del viewBox (520×620) — exactamente sobre las ramas del SVG
  const puntosRamas = [
    // Ramas bajas izquierda
    {x:132,y:432},{x:115,y:390},{x:160,y:410},{x:152,y:362},{x:108,y:338},
    // Ramas bajas derecha
    {x:385,y:432},{x:405,y:390},{x:358,y:410},{x:368,y:362},{x:412,y:338},
    // Ramas medias izquierda
    {x:170,y:415},{x:165,y:370},{x:150,y:318},{x:175,y:315},{x:76,y:364},
    // Ramas medias derecha
    {x:350,y:415},{x:355,y:370},{x:370,y:318},{x:345,y:315},{x:442,y:364},
    // Ramas altas izquierda
    {x:128,y:378},{x:122,y:328},{x:120,y:285},{x:158,y:275},{x:75,y:308},
    // Ramas altas derecha
    {x:390,y:378},{x:396,y:328},{x:398,y:285},{x:360,y:275},{x:443,y:308},
    // Centro izquierda
    {x:218,y:310},{x:220,y:262},{x:207,y:266},{x:228,y:308},{x:238,y:368},
    // Centro derecha
    {x:302,y:310},{x:300,y:262},{x:313,y:266},{x:292,y:308},{x:282,y:368}
  ];

  let abierto = false;
  function rand(a, b) { return Math.random() * (b - a) + a; }

  function abrirCarta() {
    if (abierto) return;
    abierto = true;
    document.getElementById('hint').style.opacity = '0';
    setTimeout(() => document.getElementById('sobre-wrap').classList.add('hide'), 700);
    setTimeout(lanzarPalabras, 1000);
  }

  function lanzarPalabras() {
    const scene = document.getElementById('scene');
    const sw = scene.offsetWidth, sh = scene.offsetHeight;
    const cx = sw / 2, cy = sh / 2;

    palabras.forEach((txt, i) => {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'palabra';
        el.textContent = txt;
        el.style.fontSize = rand(12, 20) + 'px';
        el.style.color = colores[i % colores.length];
        el.style.fontWeight = Math.random() > .5 ? '700' : '400';
        el.style.left = (cx - 30) + 'px';
        el.style.top  = (cy - 10) + 'px';
        const dx = (rand(-1,1) > 0 ? 1 : -1) * rand(50, sw * .44);
        const dy = rand(-sh * .58, -sh * .05);
        el.style.setProperty('--dx', dx + 'px');
        el.style.setProperty('--dy', dy + 'px');
        el.style.setProperty('--r0', rand(-25, 25) + 'deg');
        el.style.setProperty('--r1', rand(-45, 45) + 'deg');
        el.style.setProperty('--dur', rand(2.6, 4) + 's');
        scene.appendChild(el);
        setTimeout(() => el.remove(), 5500);
      }, i * 110);
    });

    const espera = palabras.length * 110 + 3200;
    setTimeout(() => {
      document.getElementById('scene').classList.add('dark');
      document.getElementById('arbol-wrap').classList.add('show');
      setTimeout(colocarHojas, 1200);
      setTimeout(
        () => document.getElementById('frase').classList.add('show'),
        1200 + palabras.length * 70 + 800
      );
    }, espera);
  }

  function svgCoordsToScreen(svgX, svgY, svgEl) {
    // Convierte coordenadas del viewBox a píxeles reales en pantalla
    // considerando cómo el SVG se renderiza con preserveAspectRatio="xMidYMid meet"
    const rect = svgEl.getBoundingClientRect();
    const vbW = 520, vbH = 620;
    const scW = rect.width, scH = rect.height;

    // "meet" mantiene aspect ratio — calculamos la escala real usada
    const scale = Math.min(scW / vbW, scH / vbH);
    const renderedW = vbW * scale;
    const renderedH = vbH * scale;

    // Offset por el letterboxing (xMid/YMid centra)
    const offX = rect.left + (scW - renderedW) / 2;
    const offY = rect.top  + (scH - renderedH) / 2;

    return {
      x: offX + svgX * scale,
      y: offY + svgY * scale
    };
  }

  function colocarHojas() {
    const scene  = document.getElementById('scene');
    const svgEl  = document.getElementById('arbol-svg');

    palabras.forEach((txt, i) => {
      setTimeout(() => {
        const p    = puntosRamas[i % puntosRamas.length];
        const pos  = svgCoordsToScreen(p.x, p.y, svgEl);
        const el   = document.createElement('div');
        el.className   = 'hoja';
        el.textContent = txt;
        el.style.fontSize  = rand(9, 13) + 'px';
        el.style.color     = colores[i % colores.length];
        el.style.transform = `rotate(${rand(-22, 22)}deg)`;
        // Centramos el texto en el punto de la rama
        el.style.left = (pos.x - 24) + 'px';
        el.style.top  = (pos.y - 8)  + 'px';
        scene.appendChild(el);
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
      }, i * 80);
    });
  }

  const sobre = document.getElementById('sobre-wrap');
  sobre.addEventListener('click', abrirCarta);
  sobre.addEventListener('touchend', (e) => { e.preventDefault(); abrirCarta(); });
</script>
</body>
</html>
